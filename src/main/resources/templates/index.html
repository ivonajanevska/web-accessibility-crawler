<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Web Accessibility Crawler</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: #f5f5f5;
        }

        h1 {
            color: #2c3e50;
        }

        h2 {
            color: #34495e;
            margin-top: 40px;
        }

        .form-container {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        input[type="text"] {
            width: 70%;
            padding: 10px;
            font-size: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        input[type="number"] {
            width: 60px;
            padding: 10px;
            font-size: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            padding: 10px 20px;
            background-color: #2c3e50;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 15px;
            cursor: pointer;
            margin-left: 10px;
        }

        button:hover {
            background-color: #1a252f;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        th {
            background-color: #2c3e50;
            color: white;
            padding: 12px;
            text-align: left;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background-color: #f9f9f9;
        }

        .status-done {
            color: green;
            font-weight: bold;
        }

        .status-failed {
            color: red;
            font-weight: bold;
        }

        .status-progress {
            color: orange;
            font-weight: bold;
        }

        a {
            color: #2c3e50;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .no-sessions {
            color: #888;
            font-style: italic;
            padding: 20px 0;
        }
    </style>
</head>
<body>

<h1>🔍 Web Accessibility Crawler</h1>


<div class="form-container">
    <h2 style="margin-top: 0;">Внеси URL за скенирање</h2>
    <form action="/crawl" method="post">
        <textarea name="urls"
                  rows="1"
                  placeholder="Внеси еден или повеќе URL-ови (секој во нов ред)&#10;https://archismart.mk&#10;https://time.mk"
                  style="width: 70%; padding: 10px; font-size: 15px;
                         border: 1px solid #ccc; border-radius: 4px;
                         resize: vertical;">
        </textarea>

        <label style="margin-left: 15px;">Длабочина:</label>
        <input type="number"
               name="maxDepth"
               value="1"
               min="1"
               max="3"/>

        <button type="submit">Скенирај</button>
    </form>
    <hr style="margin: 20px 0;">
    <form action="/batch-crawl-csv"
          method="post"
          enctype="multipart/form-data">
        <label>или прикачи CSV фајл:</label>
        <input type="file" name="file" accept=".csv" style="margin: 0 10px;">
        <input type="number"
               name="maxDepth"
               value="1"
               min="1"
               max="3"/>
        <button type="submit">Скенирај CSV</button>
    </form>
</div>


<h2>Претходни скенирања</h2>

<div th:if="${sessions.empty}" class="no-sessions">
    Сè уште нема скенирања.
</div>

<table th:if="${!sessions.empty}">
    <thead>
    <tr>
        <th>#</th>
        <th>URL</th>
        <th>Статус</th>
        <th>Датум</th>
        <th>Детали</th>
        <th>Score</th>
        <th>Grade</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="crawlSession : ${sessions}">
        <td th:text="${crawlSession.id}"></td>
        <td th:text="${crawlSession.baseUrl}"></td>
        <td>
        <span th:text="${crawlSession.status}"
              th:class="${crawlSession.status == 'DONE'} ? 'status-done' :
                        (${crawlSession.status == 'FAILED'} ? 'status-failed' :
                        'status-progress')">
        </span>
        </td>
        <td th:text="${#temporals.format(crawlSession.startedAt, 'dd.MM.yyyy HH:mm')}"></td>
        <td>
            <a th:href="@{/sessions/{id}(id=${crawlSession.id})}">
                Прегледај →
            </a>
        </td>
        <td th:text="${crawlSession.averageScore}"></td>
        <td>
    <span th:text="${crawlSession.overallGrade}"
          th:class="${crawlSession.overallGrade == 'A'} ? 'grade-a' :
                    (${crawlSession.overallGrade == 'B'} ? 'grade-b' :
                    (${crawlSession.overallGrade == 'C'} ? 'grade-c' :
                    (${crawlSession.overallGrade == 'D'} ? 'grade-d' :
                    'grade-f')))">
    </span>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
